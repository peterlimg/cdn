services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "6381:6379"
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cdn_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cdn_demo"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    environment:
      CLICKHOUSE_PASSWORD: demo-clickhouse
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "8124:8123"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      ui:
        condition: service_healthy
      edge:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./api-go
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      PORT: "4001"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cdn_demo?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in your environment}
      DEMO_ORIGIN_URL: http://ui:3000/origin
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: demo-clickhouse
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4001/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  edge:
    build:
      context: ./edge-rust
    environment:
      HOST: 0.0.0.0
      PORT: "4002"
      GO_API_URL: http://api:4001
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in your environment}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4002/health"]
      interval: 5s
      timeout: 3s
      retries: 10
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    environment:
      PORT: "3000"
      GO_API_URL: http://api:4001
      RUST_EDGE_URL: http://nginx:8080/edge
      DEMO_RESET_TOKEN: ${DEMO_RESET_TOKEN:?set DEMO_RESET_TOKEN in your environment}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in your environment}
    depends_on:
      api:
        condition: service_healthy
      edge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "3000:3000"

  ready-origin:
    image: nginx:1.27-alpine
    volumes:
      - ./test-sites/ready-demo:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/assets/demo.css"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5500:80"

  test-origin-site:
    image: nginx:1.27-alpine
    volumes:
      - ./test-sites/test-site:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/assets/demo.css"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5501:80"

  browser-origin:
    image: nginx:1.27-alpine
    volumes:
      - ./test-sites/browser-test:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/assets/demo.css"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5502:80"

volumes:
  postgres-data:
