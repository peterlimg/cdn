services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cdn_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cdn_demo"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      ui:
        condition: service_started
      edge:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  api:
    build:
      context: ./api-go
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "4001"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cdn_demo?sslmode=disable
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4001/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "4001:4001"

  edge:
    build:
      context: ./edge-rust
    environment:
      HOST: 0.0.0.0
      PORT: "4002"
      GO_API_URL: http://api:4001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4002/health"]
      interval: 5s
      timeout: 3s
      retries: 10
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    environment:
      PORT: "3000"
      GO_API_URL: http://api:4001
      RUST_EDGE_URL: http://edge:4002
    depends_on:
      api:
        condition: service_healthy
      edge:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres-data:
