services:
  api:
    build:
      context: ./api-go
    environment:
      PORT: "4001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4001/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "4001:4001"

  edge:
    build:
      context: ./edge-rust
    environment:
      HOST: 0.0.0.0
      PORT: "4002"
      GO_API_URL: http://api:4001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4002/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "4002:4002"

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    environment:
      PORT: "3000"
      GO_API_URL: http://api:4001
      RUST_EDGE_URL: http://edge:4002
    depends_on:
      api:
        condition: service_healthy
      edge:
        condition: service_healthy
    ports:
      - "3000:3000"
