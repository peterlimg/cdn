<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Browser Test Origin</title>
  <link rel="stylesheet" href="/assets/demo.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="eyebrow">About</div>
      <h1>Browser Test Origin</h1>
      <p>This is the QA-specific domain used to validate real browser routing with the `Host` header.</p>
    </header>

    <div class="card">
      <div class="status-row">
        <span class="label">Hostname</span>
        <span class="value">browser-test.unseencdn.test</span>
      </div>
      <div class="status-row">
        <span class="label">Origin container</span>
        <span class="value">browser-origin</span>
      </div>
      <div class="status-row">
        <span class="label">Visual identity</span>
        <span class="value">Purple QA sandbox</span>
      </div>
    </div>

    <footer><a href="/">Back to browser-test home</a></footer>
  </div>
</body>
</html>
