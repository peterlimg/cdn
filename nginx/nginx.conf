events {}

http {
  upstream dashboard_ui {
    server ui:3000;
  }

  upstream rust_edge {
    server edge:4002;
  }

  map $http_x_request_id $request_id_value {
    default $http_x_request_id;
    "" $request_id;
  }

  server {
    listen 8080;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Request-Id $request_id_value;

    location /edge/ {
      rewrite ^/edge/(.*)$ /$1 break;
      proxy_pass http://rust_edge;
    }

    location / {
      proxy_pass http://dashboard_ui;
    }
  }

  # CDN test endpoint — browse your static site through the edge
  # Usage: http://localhost:8081
  # Map a local hostname like test.northstarcdn.test to 127.0.0.1 and browse:
  #   http://test.northstarcdn.test:8081
  server {
    listen 8081;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Request-Id $request_id_value;

    location = / {
      rewrite ^ /index.html last;
    }

    location / {
      proxy_pass http://rust_edge/proxy$uri$is_args$args;
    }
  }
}
