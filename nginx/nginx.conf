events {}

http {
  upstream dashboard_ui {
    server ui:3000;
  }

  upstream rust_edge_default {
    server edge-us-east:4002;
  }

  upstream rust_edge_us_east {
    server edge-us-east:4002;
  }

  upstream rust_edge_eu_west {
    server edge-eu-west:4003;
  }

  upstream rust_edge_ap_south {
    server edge-ap-south:4004;
  }

  map $http_x_request_id $request_id_value {
    default $http_x_request_id;
    "" $request_id;
  }

  server {
    listen 8080;
    server_name _;

    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Request-Id $request_id_value;

    location /edge/ {
      rewrite ^/edge/(.*)$ /$1 break;
      proxy_pass http://rust_edge_default;
    }

    location /edge-nodes/edge-us-east/ {
      rewrite ^/edge-nodes/edge-us-east/(.*)$ /$1 break;
      proxy_pass http://rust_edge_us_east;
    }

    location /edge-nodes/edge-eu-west/ {
      rewrite ^/edge-nodes/edge-eu-west/(.*)$ /$1 break;
      proxy_pass http://rust_edge_eu_west;
    }

    location /edge-nodes/edge-ap-south/ {
      rewrite ^/edge-nodes/edge-ap-south/(.*)$ /$1 break;
      proxy_pass http://rust_edge_ap_south;
    }

    location / {
      proxy_pass http://dashboard_ui;
    }
  }

  # CDN test endpoint — browse your static site through the edge
  # Usage: http://localhost:8081
  # Map a local hostname like test.northstarcdn.test to 127.0.0.1 and browse:
  #   http://test.northstarcdn.test:8081
  server {
    listen 8081;
    server_name _;

    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Request-Id $request_id_value;

    location = / {
      rewrite ^ /index.html last;
    }

    location / {
      proxy_pass http://rust_edge_default/proxy$uri$is_args$args;
    }
  }
}
