<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - Test Site</title>
  <link rel="stylesheet" href="/assets/demo.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>About This Site</h1>
      <p>A minimal static origin used to test CDN caching, WAF, rate limiting, and quota enforcement.</p>
    </header>

    <div class="card">
      <h2>What gets tested</h2>
      <div class="status-row">
        <span class="label">Cache behavior</span>
        <span class="value">BYPASS, MISS, HIT</span>
      </div>
      <div class="status-row">
        <span class="label">Rate limiting</span>
        <span class="value">10 req / 60s via Redis</span>
      </div>
      <div class="status-row">
        <span class="label">Quota</span>
        <span class="value">150KB bandwidth cap</span>
      </div>
      <div class="status-row">
        <span class="label">WAF</span>
        <span class="value">Path traversal blocking</span>
      </div>
    </div>

    <footer><a href="/" style="color: var(--accent);">Back to home</a></footer>
  </div>
</body>
</html>
